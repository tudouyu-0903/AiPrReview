spring:
  application:
    name: AI-PR-Review
  profiles:
    active: local
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3-coder-next

server:
  port: 8080
  servlet:
    context-path: /api
# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.cxy.aiprreview.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn
github:
  token: ${GITHUB_TOKEN:default_value_if_needed}